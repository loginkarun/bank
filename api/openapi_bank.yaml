openapi: 3.0.3
info:
  title: bank API
  version: 1.0.0
  description: Generated from LLD batch in pipeline SCRUM-11692 - Shopping Cart Add Item Feature
  contact:
    name: API Support
    email: api-support@bank.com
servers:
  - url: https://api.bank.com
    description: Production server
  - url: https://staging-api.bank.com
    description: Staging server
tags:
  - name: Shopping Cart
    description: Operations related to shopping cart management
paths:
  /api/cart/add:
    post:
      tags:
        - Shopping Cart
      summary: Add item to cart
      description: Adds a product to the shopping cart. If the item already exists, increments the quantity.
      operationId: SCRUM-11692_add_item_to_cart_post
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartItemAddRequest'
            examples:
              addNewItem:
                summary: Add new item to cart
                value:
                  productId: 12345
                  quantity: 1
              addExistingItem:
                summary: Add existing item (increments quantity)
                value:
                  productId: 12345
                  quantity: 2
      responses:
        '201':
          description: Item successfully added to cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
              examples:
                success:
                  summary: Successful add to cart
                  value:
                    items:
                      - productId: 12345
                        name: Sample Product
                        price: 29.99
                        quantity: 1
                    totalPrice: 29.99
        '400':
          description: Validation error - Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                validationError:
                  summary: Invalid quantity
                  value:
                    timestamp: '2024-01-15T10:30:00Z'
                    traceId: abc-123-def
                    errorCode: VALIDATION_ERROR
                    message: Invalid quantity or out of stock
                    details:
                      - field: quantity
                        issue: Must be greater than 0 and less than or equal to stock
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                productNotFound:
                  summary: Product does not exist
                  value:
                    timestamp: '2024-01-15T10:30:00Z'
                    traceId: abc-123-def
                    errorCode: PRODUCT_NOT_FOUND
                    message: Product not found
                    details:
                      - field: productId
                        issue: Product does not exist in database
        '409':
          description: Out of stock
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                outOfStock:
                  summary: Product out of stock
                  value:
                    timestamp: '2024-01-15T10:30:00Z'
                    traceId: abc-123-def
                    errorCode: OUT_OF_STOCK
                    message: Product is out of stock
                    details:
                      - field: productId
                        issue: Insufficient stock available
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/cart:
    get:
      tags:
        - Shopping Cart
      summary: Get cart
      description: Retrieves the current user's shopping cart with all items and total price
      operationId: SCRUM-11692_get_cart_get
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cart retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
              examples:
                cartWithItems:
                  summary: Cart with multiple items
                  value:
                    items:
                      - productId: 12345
                        name: Sample Product A
                        price: 29.99
                        quantity: 2
                      - productId: 67890
                        name: Sample Product B
                        price: 49.99
                        quantity: 1
                    totalPrice: 109.97
                emptyCart:
                  summary: Empty cart
                  value:
                    items: []
                    totalPrice: 0.00
        '401':
          description: Unauthorized - Invalid or missing JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/cart/item:
    delete:
      tags:
        - Shopping Cart
      summary: Remove item from cart
      description: Removes a specific product from the shopping cart
      operationId: SCRUM-11692_remove_item_from_cart_delete
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartItemRemoveRequest'
            examples:
              removeItem:
                summary: Remove item from cart
                value:
                  productId: 12345
      responses:
        '200':
          description: Item successfully removed from cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
              examples:
                success:
                  summary: Cart after item removal
                  value:
                    items:
                      - productId: 67890
                        name: Sample Product B
                        price: 49.99
                        quantity: 1
                    totalPrice: 49.99
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Product not found in cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Shopping Cart
      summary: Update item quantity
      description: Updates the quantity of a specific product in the shopping cart
      operationId: SCRUM-11692_update_item_quantity_put
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartItemUpdateRequest'
            examples:
              updateQuantity:
                summary: Update item quantity
                value:
                  productId: 12345
                  quantity: 5
      responses:
        '200':
          description: Item quantity successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
              examples:
                success:
                  summary: Cart after quantity update
                  value:
                    items:
                      - productId: 12345
                        name: Sample Product A
                        price: 29.99
                        quantity: 5
                    totalPrice: 149.95
        '400':
          description: Validation error - Invalid quantity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidQuantity:
                  summary: Quantity validation failed
                  value:
                    timestamp: '2024-01-15T10:30:00Z'
                    traceId: abc-123-def
                    errorCode: VALIDATION_ERROR
                    message: Invalid quantity or out of stock
                    details:
                      - field: quantity
                        issue: Must be greater than 0 and less than or equal to stock
        '404':
          description: Product not found in cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Out of stock - Requested quantity exceeds available stock
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token-based authentication. Include the token in the Authorization header as 'Bearer {token}'
  schemas:
    CartItemAddRequest:
      type: object
      required:
        - productId
        - quantity
      properties:
        productId:
          type: integer
          format: int64
          description: Unique identifier of the product to add to cart
          example: 12345
        quantity:
          type: integer
          format: int32
          description: Quantity of the product to add
          minimum: 1
          example: 1
      description: Request body for adding an item to the shopping cart
    CartItemRemoveRequest:
      type: object
      required:
        - productId
      properties:
        productId:
          type: integer
          format: int64
          description: Unique identifier of the product to remove from cart
          example: 12345
      description: Request body for removing an item from the shopping cart
    CartItemUpdateRequest:
      type: object
      required:
        - productId
        - quantity
      properties:
        productId:
          type: integer
          format: int64
          description: Unique identifier of the product to update
          example: 12345
        quantity:
          type: integer
          format: int32
          description: New quantity for the product
          minimum: 1
          example: 3
      description: Request body for updating item quantity in the shopping cart
    CartResponse:
      type: object
      required:
        - items
        - totalPrice
      properties:
        items:
          type: array
          description: List of items currently in the shopping cart
          items:
            $ref: '#/components/schemas/CartItem'
        totalPrice:
          type: number
          format: double
          description: Total price of all items in the cart
          minimum: 0
          example: 149.97
      description: Response containing cart details with items and total price
    CartItem:
      type: object
      required:
        - productId
        - name
        - price
        - quantity
      properties:
        productId:
          type: integer
          format: int64
          description: Unique identifier of the product
          example: 12345
        name:
          type: string
          description: Name of the product
          example: Sample Product
        price:
          type: number
          format: double
          description: Price per unit of the product
          minimum: 0
          example: 29.99
        quantity:
          type: integer
          format: int32
          description: Quantity of this product in the cart
          minimum: 1
          example: 2
      description: Individual item in the shopping cart
    ErrorResponse:
      type: object
      required:
        - timestamp
        - traceId
        - errorCode
        - message
      properties:
        timestamp:
          type: string
          format: date-time
          description: Timestamp when the error occurred
          example: '2024-01-15T10:30:00Z'
        traceId:
          type: string
          description: Unique identifier for tracing the error
          example: abc-123-def-456
        errorCode:
          type: string
          description: Application-specific error code
          example: VALIDATION_ERROR
        message:
          type: string
          description: Human-readable error message
          example: Invalid quantity or out of stock
        details:
          type: array
          description: Detailed error information
          items:
            $ref: '#/components/schemas/ErrorDetail'
      description: Standard error response structure
    ErrorDetail:
      type: object
      properties:
        field:
          type: string
          description: Field name that caused the error
          example: quantity
        issue:
          type: string
          description: Description of the issue with the field
          example: Must be greater than 0 and less than or equal to stock
      description: Detailed information about a specific error